name: Deploy na AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 16.59.24.27
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY_TWO }}
          script: |
            cd ~/beka-assistent-ia-chatbot_teste
            git pull origin main
            npm install
            npm run build
            pm2 restart beka-bot
